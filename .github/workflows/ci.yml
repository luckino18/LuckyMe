name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v3.1.10/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/solana-foundation/anchor avm --force
          avm install 1.1.2
          avm use 1.1.2
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Create localnet wallet
        run: |
          mkdir -p "$HOME/.config/solana"
          solana-keygen new --no-bip39-passphrase --silent --outfile "$HOME/.config/solana/id.json"
          solana config set --url localhost --keypair "$HOME/.config/solana/id.json"

      - name: Install Node dependencies
        run: npm install --omit=optional

      - name: Audit high severity Node dependencies
        run: npm audit --audit-level=high

      - name: Install Seeker app dependencies
        run: npm install --prefix app-seeker --omit=optional

      - name: Audit high severity Seeker app dependencies
        run: npm audit --audit-level=high --prefix app-seeker

      - name: Run simulator tests
        run: npm test

      - name: Validate Seeker production config
        run: npm run app:validate:production
        env:
          EXPO_PUBLIC_LUCKYME_RELEASE_MODE: MAINNET_RELEASE
          EXPO_PUBLIC_LUCKYME_STORE_BUILD: "true"
          EXPO_PUBLIC_LUCKYME_API_URL: https://api.luckyme.example
          EXPO_PUBLIC_LUCKYME_WALLET_CHAIN: solana:mainnet
          EXPO_PUBLIC_LUCKYME_WALLET_RPC_URL: https://api.mainnet-beta.solana.com
          EXPO_PUBLIC_LUCKYME_SOLANA_CLUSTER: mainnet-beta
          EXPO_PUBLIC_LUCKYME_PROGRAM_ID: 4bndxrGfuUcSLJnbCu8vs9WZ4qHdKGwcoeCybNThkrA3

      - name: Typecheck Seeker app
        run: npm run app:typecheck

      - name: Check Seeker Expo project
        run: npm --prefix app-seeker run doctor

      - name: Check Anchor program Rust
        run: cargo check

      - name: Run Anchor program Rust unit tests
        run: cargo test

      - name: Build Anchor SBF program
        run: NO_DNA=1 anchor build --provider.cluster localnet

      - name: Run Anchor localnet integration tests
        run: npm run test:anchor
