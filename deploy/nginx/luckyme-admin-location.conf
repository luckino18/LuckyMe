location ^~ /admin/api/ {
    auth_basic "LuckyMe Admin";
    auth_basic_user_file /etc/nginx/luckyme-admin.htpasswd;
    limit_except GET POST { deny all; }
    client_max_body_size 8k;
    proxy_pass http://127.0.0.1:8791/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-LuckyMe-Admin-Proxy 1;
    proxy_set_header X-LuckyMe-Admin-User $remote_user;
    proxy_read_timeout 130s;
    add_header Cache-Control "no-store" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    add_header X-Content-Type-Options "nosniff" always;
}

location ^~ /admin/ {
    auth_basic "LuckyMe Admin";
    auth_basic_user_file /etc/nginx/luckyme-admin.htpasswd;
    add_header Cache-Control "no-store" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self'; style-src 'self'; script-src 'self'; base-uri 'none'; frame-ancestors 'none'; form-action 'none'" always;
    try_files $uri $uri/ =404;
}
