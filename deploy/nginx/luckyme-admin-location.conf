location ^~ /admin/ {
    auth_basic "LuckyMe Admin";
    auth_basic_user_file /etc/nginx/luckyme-admin.htpasswd;
    add_header Cache-Control "no-store" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self'; style-src 'self'; script-src 'self'; base-uri 'none'; frame-ancestors 'none'; form-action 'none'" always;
    try_files $uri $uri/ =404;
}
